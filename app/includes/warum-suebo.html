<!-- start text-image section -->
<section class="text-image section ellipse-glow text-image--2">
	<div class="container">
		
		<div class="row">
			<div class="col-6">
<!-- start illustration item -->
<div class="ilustration-wrapper">
	<picture>
		<source srcset="img/c1.webp" type="image/webp">
		<img src="img/c1.png" alt="illustration" width="650" height="620" loading="lazy" class="ilustration-item ilustration-item-1">
	</picture>

	<div class="ilustration-item-wrapper">
		<picture>
			<source srcset="img/c2.webp" type="image/webp">
			<img src="img/c2.png" alt="illustration" width="650" height="620" loading="lazy" class="ilustration-item ilustration-item-2">
		</picture>
	</div>
</div>
<!-- end illustration item -->
			</div>

			<div class="col-6">
				<div class="text-image__item">

					<div class="section-header section-header--left">
						<div class="save-title">
							{{blocks.whySuebo.eyebrow}}
						</div>
						<h2 class="h2">
							{{blocks.whySuebo.title}}
						</h2>
						<div class="description">
							{{blocks.whySuebo.description}}
						</div>
					</div>
		
		<div class="adv-list">
		{{#each blocks.whySuebo.items}}
						<div class="adv-item">
							<div class="adv-item__title-row">
								<div class="adv-item__number">{{number}}</div>
								<div class="h4 adv-item__heading">{{title}}</div>
							</div>
							<div class="adv-item__content">
								<p>
									{{description}}
								</p>
							</div>
						</div>
		{{/each}}
					</div>			
					
				</div>
			</div>

		</div>
		

	

			
		


	</div>
</section>
<!-- end text-image section -->
